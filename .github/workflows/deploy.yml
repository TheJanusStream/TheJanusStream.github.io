name: Deploy Exhibit to GitHub Pages

on:
  # Trigger the workflow on push to the main branch
  push:
    branches: [main]
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:
  # Optional: Schedule a nightly build to keep stats fresh
  schedule:
    - cron: '0 3 * * *' # Runs at 03:00 UTC every day

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build & Hydrate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build SvelteKit Site
        # The GITHUB_TOKEN is automatically provided by the Actions runner.
        # We pass it as an environment variable so SvelteKit's fetch logic can use it to bypass API limits.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4